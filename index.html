<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Espila Mail</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Nunito',sans-serif;
}

body{
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    text-align:center;
}

.logo{
    font-size:64px;
    font-weight:700;
    color:#7B2CF5;
}

.subtitle{
    font-size:22px;
    color:#666666;
    margin-top:8px;
}

.card{
    margin-top:35px;
    padding:35px;
    border-radius:20px;
    background:#ffffff;
    box-shadow:0 10px 35px rgba(0,0,0,.08);
}

h2{
    font-size:26px;
    margin-bottom:25px;
    color:#333;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:18px;
    border:1px solid #dddddd;
    border-radius:10px;
    font-size:16px;
    outline:none;
    transition:.3s;
}

input:focus{
    border-color:#7B2CF5;
    box-shadow:0 0 0 3px rgba(123,44,245,.15);
}

button{
    width:100%;
    padding:15px;
    background:#7B2CF5;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#6420d8;
}

.footer{
    margin-top:25px;
    color:#777;
    font-size:14px;
}

.footer a{
    color:#7B2CF5;
    text-decoration:none;
}

.footer a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">Espila</div>

<div class="subtitle">Mail</div>

<div class="card">

<h2>Sign In</h2>

<form>

<input
type="email"
placeholder="Email Address"
required>

<input
type="password"
placeholder="Password"
required>

<button type="submit">
Sign In
</button>

</form>

<div class="footer">

Forgot your password?
<br><br>

<a href="#">
Create Account
</a>

</div>

</div>

</div>

</body>
</html>
